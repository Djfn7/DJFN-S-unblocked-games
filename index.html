<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked Games Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #09090b;
            color: #f4f4f5;
        }
        .game-card:hover img {
            transform: scale(1.1);
        }
        .modal-enter {
            animation: slideUp 0.3s ease-out forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Header -->
    <header class="sticky top-0 z-40 bg-zinc-950/80 backdrop-blur-md border-b border-zinc-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><line x1="6" x2="10" y1="12" y2="12"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="15" x2="15.01" y1="13" y2="13"/><line x1="18" x2="18.01" y1="11" y2="11"/><rect width="20" height="12" x="2" y="6" rx="2"/></svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight hidden sm:block">
                    UNBLOCKED<span class="text-indigo-500">GAMES</span>
                </h1>
            </div>

            <div class="flex-1 max-w-md mx-4">
                <div class="relative">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <input
                        type="text"
                        id="search-input"
                        placeholder="Search games..."
                        class="w-full bg-zinc-900 border border-zinc-800 rounded-full py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-sm text-white"
                    />
                </div>
            </div>

            <div class="flex items-center gap-4">
                <a href="https://github.com" target="_blank" class="text-zinc-400 hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.28 1.15-.28 2.35 0 3.5-.73 1.02-1.08 2.25-1 3.5 0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <h2 class="text-3xl font-bold mb-2">Popular Games</h2>
            <p class="text-zinc-400">Play the best unblocked games directly in your browser.</p>
        </div>

        <div id="games-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Games will be injected here -->
        </div>

        <div id="no-results" class="hidden text-center py-20">
            <p class="text-zinc-500 text-lg">No games found matching "<span id="query-text"></span>"</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-zinc-800 py-12 mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-zinc-500 text-sm">
                © <span id="year"></span> Unblocked Games Hub. All games are property of their respective owners.
            </p>
        </div>
    </footer>

    <!-- Game Player Modal -->
    <div id="game-modal" class="hidden fixed inset-0 bg-black z-50 flex flex-col modal-enter">
        <div class="bg-zinc-900 border-b border-zinc-800 p-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button id="close-modal" class="p-2 hover:bg-zinc-800 rounded-full transition-colors text-zinc-400 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
                <h2 id="modal-title" class="text-xl font-bold text-white"></h2>
            </div>
            <div class="flex items-center gap-2">
                <button id="reload-game" class="p-2 hover:bg-zinc-800 rounded-full transition-colors text-zinc-400 hover:text-white" title="Reload Game">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
                </button>
                <button id="fullscreen-game" class="p-2 hover:bg-zinc-800 rounded-full transition-colors text-zinc-400 hover:text-white" title="Fullscreen">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
                </button>
            </div>
        </div>
        <div class="flex-1 bg-zinc-950 relative">
            <iframe 
                id="game-iframe" 
                class="w-full h-full border-none" 
                allow="accelerometer *; ambient-light-sensor *; autoplay *; clipboard-read *; clipboard-write *; encrypted-media *; fullscreen *; geolocation *; gyroscope *; local-network-access *; magnetometer *; midi *; payment *; picture-in-picture *; screen-wake-lock *; speaker *; sync-xhr *; vibrate *; vr *; web-share *; gamepad *; microphone *" 
                sandbox="allow-downloads allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-top-navigation-by-user-activation allow-storage-access-by-user-activation allow-orientation-lock allow-pointer-lock allow-presentation"
                title="Game Player"
            ></iframe>
        </div>
    </div>

    <script>
        const games = [
            { 
                id: "google-script-game", 
                title: "Google Script Game", 
                url: "https://n-finrlwelu2m5st2oq2etipr2kly2skj3gwmb3rq-0lu-script.googleusercontent.com/userCodeAppPanel", 
                thumbnail: "https://picsum.photos/seed/googlegame/400/300" 
            },
            {
                id: "fight-arena-online",
                title: "Fight Arena Online",
                url: "https://fight-arena-online.game-files.crazygames.com/unity/unity2020/fight-arena-online.html?skipPrerollFirstSession=true&v=1.354",
                thumbnail: "https://picsum.photos/seed/fightarena/400/300"
            },
            {
                id: "space-waves",
                title: "Space Waves",
                url: "https://space-waves.game-files.crazygames.com/unity/unity2020/space-waves.html?skipPrerollFirstSession=true&v=1.354",
                thumbnail: "https://picsum.photos/seed/spacewaves/400/300"
            }
        ];

        const gamesGrid = document.getElementById('games-grid');
        const searchInput = document.getElementById('search-input');
        const noResults = document.getElementById('no-results');
        const queryText = document.getElementById('query-text');
        const gameModal = document.getElementById('game-modal');
        const gameIframe = document.getElementById('game-iframe');
        const modalTitle = document.getElementById('modal-title');
        const closeModal = document.getElementById('close-modal');
        const reloadGame = document.getElementById('reload-game');
        const fullscreenGame = document.getElementById('fullscreen-game');
        const yearSpan = document.getElementById('year');

        yearSpan.textContent = new Date().getFullYear();

        function renderGames(filteredGames) {
            gamesGrid.innerHTML = '';
            if (filteredGames.length === 0) {
                gamesGrid.classList.add('hidden');
                noResults.classList.remove('hidden');
                queryText.textContent = searchInput.value;
                return;
            }

            gamesGrid.classList.remove('hidden');
            noResults.classList.add('hidden');

            filteredGames.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card bg-zinc-900 rounded-xl overflow-hidden border border-zinc-800 cursor-pointer group transition-all hover:scale-105 active:scale-95';
                card.innerHTML = `
                    <div class="aspect-video relative overflow-hidden">
                        <img src="${game.thumbnail}" alt="${game.title}" class="w-full h-full object-cover transition-transform duration-300" referrerpolicy="no-referrer">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <span class="bg-white text-black px-4 py-2 rounded-full font-bold text-sm">PLAY NOW</span>
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="text-zinc-100 font-semibold text-lg truncate">${game.title}</h3>
                    </div>
                `;
                card.onclick = () => openGame(game);
                gamesGrid.appendChild(card);
            });
        }

        function openGame(game) {
            modalTitle.textContent = game.title;
            gameIframe.src = game.url;
            gameModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        closeModal.onclick = () => {
            gameModal.classList.add('hidden');
            gameIframe.src = '';
            document.body.style.overflow = 'auto';
        };

        reloadGame.onclick = () => {
            gameIframe.src = gameIframe.src;
        };

        fullscreenGame.onclick = () => {
            gameIframe.requestFullscreen();
        };

        searchInput.oninput = (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = games.filter(g => g.title.toLowerCase().includes(query));
            renderGames(filtered);
        };

        // Initial render
        renderGames(games);
    </script>
    <!-- Standalone version -->
</body>
</html>
